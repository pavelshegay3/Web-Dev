<div id="products">
    <div *ngFor="let product of productList" id="product">
        <img [src] = "product.image" alt="{{product.name}}">
        <a [href] = "product.link" target="_blank">
            <h3>{{product.name}}</h3>
        </a>
        <button (click) = "shareProduct(product)">Share on Telegram!</button>
        <p [innerHTML]="product.description"></p>
    </div>
</div>
