<!DOCTYPE html>
<html>
<body>
    <script>
        function filterRange(arr, a, b){
            for (let i = arr.length - 1; i >= 0; i--){
                let val = arr[i];
                if (val < a || val > b) {
                    arr.splice(i, 1);
                }
            }
        }
        let arr = [5, 3, 8, 1];
        filterRange(arr, 1, 4);
        alert(arr);
    </script>
</body>

</html>
