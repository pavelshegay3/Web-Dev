<!DOCTYPE HTML>
<html>

<body>

    <p>Before the script...</p>

    <script>
        function isEmpty(obj) {
            for (let key in obj) {
                return false;
            }
            return true;
        }
        let schedule = {};

        alert( isEmpty(schedule) ); // true

        schedule["8:30"] = "get up";

        alert( isEmpty(schedule) );
        let salaries = {
            John: 100,
            Ann: 160,
            Pete: 130
        };
        let sum = 0;
        for (let i in salaries){
            sum += salaries[i];
        }
        alert(sum);


        // before the call
        let menu = {
            width: 200,
            height: 300,
            title: "My menu"
        };

        function multiplyNumeric(menu){
            for (let i in menu){
                if (typeof menu[i] == "number"){
                    menu[i] = menu[i] * 2;
                }
            }
        }

        multiplyNumeric(menu);

        // after the call
        menu = {
            width: 400,
            height: 600,
            title: "My menu"
        };
    </script>

  <p>...After the script.</p>

</body>

</html>
